<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <h2>✨ Menu</h2>

    <p id="status"></p>

    <button onclick="sair()">Sair</button>
  </div>

  <script>
    // 🔒 verifica se veio do login
    if (localStorage.getItem("logado") !== "true") {
      window.location.href = "login.html";
    } else {
      document.getElementById("status").innerText = "Você está logado ✅";
    }

    function sair() {
      localStorage.removeItem("logado");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
